version: 1

# ── Runtime parameters ────────────────────────────────────────────────────────
runtime:
  phase0:
    concurrency: 50
    timeout: 3       # seconds per connection attempt
    retries: 1       # retry count on timeout
  phase1:
    concurrency: 30
    timeout: 5
  phase2:
    concurrency: 20
    timeout: 5
    max_extra_gets: 3   # budget for additional GETs per target in Phase 2
  phase3:
    concurrency: 10
    timeout: 10
    retries: 1

# ── Phase 0 – Non-HTTP exclusion ──────────────────────────────────────────────
phase0:
  # Raw byte prefixes that indicate non-HTTP services.
  # Strings are UTF-8 encoded; use exact service banner starts.
  non_http_prefixes:
    - "-ERR"      # Redis error reply
    - "+OK"       # Redis inline OK
    - "+PONG"     # Redis PING reply
    - "SSH-2.0"   # SSH-2 banner
    - "* OK"      # IMAP greeting (authenticated)
    - "* BYE"     # IMAP goodbye
    - "220 "      # SMTP / FTP service ready (note trailing space)
    - "RFB "      # VNC RFB protocol banner
    - "\xff\xfd"  # Telnet IAC DO negotiation
    - "\x4a\x00\x00\x00"  # MySQL initial greeting (packet length J + NUL×3)
    - "N\x00\x00\x00"     # PostgreSQL startup message length prefix

  # Fraction of non-printable bytes in the first 512 bytes that triggers
  # "binary response" exclusion (databases, custom binary protocols).
  binary_threshold: 0.30


# ── Phase 1 – LLM fingerprinting ─────────────────────────────────────────────
phase1:
  # Probe paths sent in priority order.  "/" is always last; it is reused
  # from the Phase 0 cache.  Stop probing once an API path confirms LLM.
  probe_paths:
    - /v1/models
    - /api/v1/models       # reverse-proxy prefix variant (aliased to /v1/models)
    - /openai/v1/models    # another common proxy prefix (aliased to /v1/models)
    - /api/tags
    - /info
    - /health
    - /docs
    - /v2/models           # Triton/KServe v2 inference API
    - /

  # Confirm rules: each entry maps a probe path to the JSON/body condition
  # that signals a real LLM API (→ is_llm = "确认").
  # Rules are evaluated in probe_paths order; first match wins.
  confirm_rules:
    - path: /v1/models
      when_status: 200
      match:
        type: json_all
        rules:
          - { field: object, op: eq, value: list }
          - { field: data,   op: exists }

    # Reverse-proxy prefix variants — aliased to /v1/models so Phase 2 tools
    # with requires_cached_ok: /v1/models work without modification.
    - path: /api/v1/models
      when_status: 200
      cache_also_as: /v1/models
      match:
        type: json_all
        rules:
          - { field: object, op: eq, value: list }
          - { field: data,   op: exists }

    - path: /openai/v1/models
      when_status: 200
      cache_also_as: /v1/models
      match:
        type: json_all
        rules:
          - { field: object, op: eq, value: list }
          - { field: data,   op: exists }

    - path: /api/tags
      when_status: 200
      match:
        type: json_has_key
        key: models

    - path: /info
      when_status: 200
      match:
        type: json_has_key
        key: model_id

    # /health: probed but no confirm rule defined here – intentionally omitted
    # (llama.cpp /health alone is too ambiguous; detected via /props in Phase 2)

    - path: /v2/models
      when_status: 200
      match:
        type: json_has_key
        key: models

    - path: /docs
      when_status: any
      match:
        type: body_substring_any
        values:
          - /v1/chat/completions
          - /v1/embeddings

  # Suspect detection: "/" response body contains frontend framework signals
  # (→ is_llm = "疑似" when no API path confirmed LLM).
  suspect:
    keywords:
      - gradio
      - open-webui
      - __gradio_mode__
      - _stcore
      - jy-chat
      - chat-ai-window
    # Additional compound predicate: body must contain ALL of these.
    # exclude_if_contains prevents generic marketing pages from matching.
    extra_predicates:
      - type: body_all_substrings_ci
        values:
          - "<title>dify</title>"
          - "/_next/static/"
      # Generic AI/model serving endpoints, e.g.
      # {"model_class":"YOLOv8Model","status":"UP"}
      - type: json_all
        rules:
          - { field: model_class, op: exists }
          - { field: status, op: eq, value: UP }

  # Optional SPA/JS-bundle suspect detection.  This does not execute JS; it
  # fetches a small number of same-origin bundle files referenced by "/" and
  # searches for strong LLM/OpenAI-compatible API signals.
  js_bundle_suspect:
    enabled: true
    max_scripts: 3
    max_bytes: 262144
    include_src_patterns:
      - ".js"
      - "/_next/static/"
      - "/static/js/"
      - "/assets/"
    api_path_keywords:
      - "/v1/chat/completions"
      - "/v1/models"
      - "/v1/embeddings"
      - "/api/chat"
      - "/api/conversation"
    semantic_keywords:
      - openai
      - api_key
      - api-key
      - llm
      - chatgpt
      - jy-chat
      - modelspage
      - chatcomposer
      - chatplaygroundpage
      - aichat
      - aiapp
      - aimodel
      - airag
      - chat-ai-window
      - 'role:`assistant`'
      - 'role:"assistant"'
      - promptmarket
      - qwen
      - deepseek
      - ollama
      - vllm
    chat_keywords:
      - jy-chat
      - modelspage
      - chatcomposer
      - chatplaygroundpage
      - aichat
      - chat-ai-window
      - 'role:`assistant`'
      - 'role:"assistant"'
      - promptmarket
    exclude_keywords:
      - grafana
      - portainer
      - minio
      - prometheus
      - ruoyi
      - swagger-ui
      - seeyon
      - wechataccountauthmanager
      - getorgmodel
      - wechat
      - ngmodel
      - ng-model
      - v-model
      - x-model
      - ismodellistener
      - ace/ext/modelist
      - gmssh
      - fortigate
      - atrust
      - dataease
      - devops workplace
      - competitionapply-web
      - haosmart
      - 悟空crm
      - 审批系统
    nextjs_deep_scan:
      enabled: true
      trigger_src_patterns:
        - "/_next/static/"
      max_scripts: 50
      max_bytes: 524288
      keywords:
        - dify
        - /console/api
        - /workspaces/current
        - chat-messages
        - completion-messages
        - model_provider
        - provider_models
        - SELF_HOSTED
        - X-Dify-Version

  # Guards: downgrade "确认" to "疑似" when the root page already shows a
  # frontend-only UI that makes the API signal ambiguous.
  guards:
    - description: "frontend UI overrides weak API-only signal"
      root_contains_any:
        - "open webui"
        - "open-webui"
        - "__gradio_mode__"
        - "gradio-app"
        - "_stcore"
        - "streamlit"
      downgrade_for_paths:
        - /v1/models      # OpenAI-compatible path can exist behind a frontend proxy

  # Auth-gated suspects: if a probe returns 401/403 AND the response body
  # contains any of these keywords, the target is marked 疑似 after the full
  # probe loop (only when no path has already confirmed or suspected LLM).
  auth_suspect:
    status_codes: [401, 403]
    body_keywords:
      - api-key
      - api_key
      - openai
      # "authorization" removed: too generic — S3/MinIO 403 bodies always contain it
    # If any of these strings appear in the body, skip the auth check entirely.
    # Prevents S3/object-storage XML error pages from triggering false positives.
    exclude_body_patterns:
      - "<?xml"
      - "<Code>AccessDenied</Code>"
      - "InvalidSecurity"
      - "SignatureDoesNotMatch"
      - "NoSuchBucket"
      - "InvalidAccessKeyId"
      # Generic auth / gateway pages
      - "<title>401 Unauthorized</title>"
      - "<title>403 Forbidden</title>"
      - "<title>403</title>"
      - "401 Unauthorized"
      - "403 Forbidden"
      - "conf not found"
      - "Document Error: Unauthorized"
      - "Web Filtering"
      # Elasticsearch / generic security APIs
      - "security_exception"
      - "missing authentication credentials"
      - "WWW-Authenticate"
      # Probe-path reflections and generic login/API gateway responses
      - "Access Denied"
      - "Authentication required"
      - "data-redirect-url"
      - "/login?from="
      - "token is empty for uri"
      - '"error":"Forbidden"'
      - '"path":"/openai/v1/models"'
      - "uri {/openai/v1/models}"


# ── Phase 2 – Deploy tool identification ─────────────────────────────────────
# Tools are evaluated in order; first match wins and returns immediately.
# scope values: "confirmed" and/or "suspect".
# For "suspect" targets only root-sourced checks are allowed (cache reads only).
#
# Source prefixes:
#   root                 – cached GET /
#   cached:<path>        – read from probe cache (no new request)
#   get:<path>           – always perform a fresh GET (counts toward max_extra_gets)
#   cached_or_get:<path> – use cache if present, else GET
#
# match.type values: see scan_config.py eval_match() docstring.
phase2:
  tools:
    # ── Root-based checks (run for both confirmed and suspect) ────────────────
    - name: open-webui
      scope: [confirmed, suspect]
      match:
        source: root
        type: body_substring_any_ci
        values: ["open webui", "open-webui"]

    - name: one-api
      scope: [confirmed, suspect]
      match:
        source: root
        type: body_substring_any_ci
        values: ["One API", "New API"]

    - name: "AI模型服务"
      scope: [suspect]
      match:
        source: root
        type: json_all
        rules:
          - { field: model_class, op: exists }
          - { field: status, op: eq, value: UP }

    # ── API-based checks (confirmed only) ────────────────────────────────────
    - name: ollama
      scope: [confirmed]
      match:
        source: "cached:/api/tags"
        type: json_has_key
        key: models
      # If Phase 1 confirmed via /v1/models (not /api/tags), do a fresh GET
      supplements:
        - source: "get:/api/tags"
          type: json_has_key
          key: models
      # Fetch /api/version to populate deploy_version
      version_from:
        source: "cached_or_get:/api/version"
        type: json_field
        field: version

    - name: tgi
      scope: [confirmed]
      match:
        source: "cached:/info"
        type: json_all_keys_exist
        keys: [model_id, max_input_length]

    - name: vllm
      scope: [confirmed]
      match:
        source: "cached:/v1/models"
        type: json_nested_contains_ci
        json_path: "data.0.owned_by"
        value: vllm
      # Supplemental probe: Prometheus metrics endpoint
      supplements:
        - source: "get:/metrics"
          type: body_substring
          value: "vllm_"

    - name: TensorRT-LLM
      scope: [confirmed]
      requires_cached_ok: /v1/models
      match:
        source: "cached_or_get:/metrics"
        type: body_substring_any_ci
        values: [tensorrt_llm, "TensorRT-LLM", nvidia_trt_llm, triton_tensorrt_llm]

    # The following tools require /v1/models to have been confirmed 200 in
    # Phase 1 (requires_cached_ok).  They add evidence for that path
    # automatically even when their own probe determines the final match.
    - name: llama.cpp
      scope: [confirmed]
      requires_cached_ok: /v1/models
      match:
        source: "get:/props"
        type: body_substring
        value: default_generation_settings

    - name: fastchat
      scope: [confirmed]
      requires_cached_ok: /v1/models
      match:
        source: "cached_or_get:/docs"
        type: body_substring_ci
        value: fastchat

    - name: xinference
      scope: [confirmed]
      requires_cached_ok: /v1/models
      match:
        source: "cached_or_get:/docs"
        type: body_substring_ci
        value: xinference

    - name: localai
      scope: [confirmed]
      requires_cached_ok: /v1/models
      match:
        source: "cached_or_get:/docs"
        type: body_substring_any_ci
        values: [localai, "models/available"]

    - name: sglang
      scope: [confirmed]
      requires_cached_ok: /v1/models
      match:
        source: "get:/get_server_info"
        type: body_substring_ci
        value: sglang

    - name: litellm
      scope: [confirmed]
      requires_cached_ok: /v1/models
      match:
        source: "get:/model/info"
        type: body_substring_ci
        value: litellm_params

    # Fallback for any /v1/models-confirmed target that didn't match above
    - name: "未知-OpenAI兼容"
      scope: [confirmed]
      requires_cached_ok: /v1/models
      match:
        type: always

    # Triton Inference Server / KServe v2 API — uses /v2/models cached from Phase 1
    - name: triton
      scope: [confirmed]
      match:
        source: "cached:/v2/models"
        type: json_has_key
        key: models

    - name: langserve
      scope: [confirmed]
      match:
        source: "cached_or_get:/docs"
        type: body_any_of
        conditions:
          - { type: body_substring_ci, value: langserve }
          - { type: body_all_substrings_ci, values: [invoke, stream] }

    # ── Root fallbacks (run for confirmed after API checks; primary for suspect)
    - name: gradio
      scope: [confirmed, suspect]
      match:
        source: root
        type: body_substring_any_ci
        values: ["__gradio_mode__", "gradio-app", "gradio"]

    - name: streamlit
      scope: [confirmed, suspect]
      match:
        source: root
        type: body_substring_any_ci
        values: [_stcore, streamlitapp, streamlit]

    - name: open-webui
      scope: [confirmed]
      match:
        source: root
        type: body_substring_ci
        value: "open-webui"


# ── Phase 3 – Model info extraction ──────────────────────────────────────────
phase3:
  # Cached GET responses checked in priority order before any new requests.
  cache_sources:
    - path: /
      extract:
        type: json_field
        field: model_class

    - path: /v1/models
      extract:
        type: json_list_field
        list_key: data
        item_field: id

    - path: /api/tags
      extract:
        type: json_list_field
        list_key: models
        item_field: name

    - path: /info
      extract:
        type: json_field
        field: model_id

  # POST probes tried in order when cached sources yield nothing.
  post_probes:
    - path: /v1/chat/completions
      method: POST
      body:
        model: test
        messages:
          - role: user
            content: hi
        max_tokens: 1
      on_success:
        status: [200]
        extract:
          type: json_field
          field: model
      on_error:
        status: [400, 404, 422]
        extract:
          type: error_regex
          # Captures quoted tokens; filter keeps likely model identifiers
          regex: '"([a-zA-Z0-9_\-./: ]+)"'
          # context_patterns tried first — more precise extraction from error messages
          context_patterns:
            - 'model["\s:=]+([a-zA-Z0-9_\-./]+)'
            - "model '([a-zA-Z0-9_\\-./]+)'"
          # exclude_patterns blacklist known noisy placeholder/literal strings
          exclude_patterns:
            - test
            - "your-model-id"
            - string
            - "null"
            - none
            - example
          filter:
            min_len: 3
            max_len: 80
            must_contain_any_char: ["/", ":", "-"]

    - path: /api/generate
      method: POST
      body:
        model: test
        prompt: hi
        stream: false
      on_error:
        status: [400, 404, 422]
        extract:
          type: error_regex
          regex: '"([a-zA-Z0-9_\-./: ]+)"'
          context_patterns:
            - 'model["\s:=]+([a-zA-Z0-9_\-./]+)'
            - "model '([a-zA-Z0-9_\\-./]+)'"
          exclude_patterns:
            - test
            - "your-model-id"
            - string
            - "null"
            - none
            - example
          filter:
            min_len: 3
            max_len: 80
            must_contain_any_char: ["/", ":", "-"]

  # Value written to model_info when nothing is found
  fallback_literal: "未知"


# ── AI/GPU compute classification hints ─────────────────────────────────────
# These do not confirm GPU usage by themselves. They provide evidence and
# likelihood labels for the extra CSV service_type/model_domain/gpu_* fields.
ai_service:
  gpu_keywords:
    - cuda
    - gpu
    - nvidia
    - tensorrt
    - onnxruntime-gpu
    - torch.cuda
    - "device: cuda"
    - dcgm
  tensorrt_llm_keywords:
    - tensorrt_llm
    - TensorRT-LLM
    - nvidia_trt_llm
    - triton_tensorrt_llm
  vision_keywords:
    - yolo
    - grounding
    - detection
    - segmentation
    - visual
    - vision
  ocr_keywords:
    - ocr
    - paddleocr
  frontend_keywords:
    - open-webui
    - dify
    - chatcomposer
    - chatplaygroundpage
    - aichat
    - chat-ai-window
    - jy-chat
